{% extends 'base.html' %}
{% block title %}{% if mode == 'edit' %}공고 수정{% else %}공고 등록{% endif %}{% endblock %}
{% block page_title %}채용 공고{% endblock %}

{% block content %}
<div style="max-width:680px;">
  <a href="{{ url_for('recruit_postings') }}" class="btn btn-ghost btn-sm" style="margin-bottom:18px;">
    <i class="fas fa-arrow-left"></i> 공고 목록으로
  </a>

  <div class="card">
    <div class="card-head">
      <span class="card-title">{% if mode == 'edit' %}채용 공고 수정{% else %}채용 공고 등록{% endif %}</span>
    </div>
    <div class="card-body">
      {% if error %}
      <div class="login-error" style="margin-bottom:16px;">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
      {% endif %}

      <form method="POST"
            action="{{ url_for('recruit_posting_edit', posting_id=posting.id) if mode == 'edit' else url_for('recruit_posting_new') }}">

        <div class="field">
          <label class="form-label">공고 제목 <span style="color:var(--red);">*</span></label>
          <input type="text" name="title" class="input"
                 value="{{ posting.title if posting else '' }}"
                 placeholder="예: 백엔드 엔지니어 (Python/Flask) 경력 2년 이상" required>
        </div>

        <div class="grid-2" style="gap:14px;">
          <div class="field">
            <label class="form-label">부서</label>
            <select name="department_id" class="input">
              <option value="">— 미정 —</option>
              {% for d in depts %}
              <option value="{{ d.id }}"
                      {% if posting and posting.department_id == d.id %}selected{% endif %}>
                {{ d.name }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="field">
            <label class="form-label">직급</label>
            <select name="position_id" class="input">
              <option value="">— 미정 —</option>
              {% for p in poses %}
              <option value="{{ p.id }}"
                      {% if posting and posting.position_id == p.id %}selected{% endif %}>
                {{ p.name }}
              </option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="grid-2" style="gap:14px;">
          <div class="field">
            <label class="form-label">상태</label>
            <select name="status" class="input">
              <option value="open"   {% if not posting or posting.status == 'open'   %}selected{% endif %}>공개 (게시중)</option>
              <option value="draft"  {% if posting and posting.status == 'draft'  %}selected{% endif %}>임시저장 (비공개)</option>
              <option value="closed" {% if posting and posting.status == 'closed' %}selected{% endif %}>마감</option>
            </select>
          </div>
          <div class="field">
            <label class="form-label">지원 마감일</label>
            <input type="date" name="deadline" class="input"
                   value="{{ posting.deadline if posting and posting.deadline else '' }}">
          </div>
        </div>

        <div class="field">
          <label class="form-label">직무 설명</label>
          <textarea name="description" class="input" rows="5"
                    placeholder="주요 업무, 역할 개요, 팀 소개 등">{{ posting.description if posting and posting.description else '' }}</textarea>
        </div>

        <div class="field">
          <label class="form-label">자격 요건</label>
          <textarea name="requirements" class="input" rows="5"
                    placeholder="필수 스킬, 우대 사항, 경력 요건 등">{{ posting.requirements if posting and posting.requirements else '' }}</textarea>
        </div>

        <div style="display:flex; gap:10px;">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-check"></i> {% if mode == 'edit' %}변경사항 저장{% else %}공고 등록{% endif %}
          </button>
          <a href="{{ url_for('recruit_postings') }}" class="btn btn-ghost">취소</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
