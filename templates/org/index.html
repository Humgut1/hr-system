{% extends 'base.html' %}
{% block title %}조직도{% endblock %}
{% block page_title %}조직도{% endblock %}

{% block head %}
<style>
#og-wrap {
  display: flex;
  height: calc(100vh - 160px);
  min-height: 520px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  background: var(--card);
}
.o-left { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.o-bc {
  padding: 10px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 2px;
  font-size: 12px; color: var(--tx-3); flex-wrap: wrap;
}
.o-bc span { cursor: pointer; padding: 2px 6px; border-radius: 4px; }
.o-bc span:hover { background: var(--border); color: var(--tx-1); }
.o-canvas {
  flex: 1; overflow-y: auto; padding: 24px 16px;
  display: flex; flex-direction: column; align-items: center;
}
.o-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.o-conn { width: 2px; height: 24px; background: var(--border); margin: 0 auto; }
.o-lbl {
  font-size: 11px; color: var(--tx-3); margin-bottom: 8px;
  align-self: flex-start; padding-left: 4px;
}

.pc {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--r);
  padding: 12px 8px 10px;
  cursor: pointer;
  width: 116px;
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; text-align: center;
  position: relative;
  transition: border-color .12s, transform .1s;
  user-select: none;
}
.pc:hover { border-color: var(--primary); }
.pc:active { transform: scale(.97); }
.pc.p-sel { border: 2px solid var(--primary); }
.pc.p-foc { border: 2px solid var(--primary); background: #eff6ff; }

.pc-tip {
  position: absolute; bottom: -22px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px; color: var(--tx-3);
  white-space: nowrap; opacity: 0;
  transition: opacity .15s; pointer-events: none;
}
.pc:hover .pc-tip { opacity: 1; }

.p-av {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.p-nm { font-size: 12px; font-weight: 700; color: var(--tx-1); line-height: 1.3; }
.p-tl { font-size: 11px; color: var(--tx-3); line-height: 1.3; }
.p-ct { font-size: 10px; color: var(--tx-3); display: flex; align-items: center; gap: 2px; margin-top: 2px; }
.p-me {
  position: absolute; top: -9px; left: 50%; transform: translateX(-50%);
  background: var(--primary); color: #fff;
  font-size: 9px; padding: 1px 8px; border-radius: 20px; white-space: nowrap;
}

.nbtn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 5px 14px; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  color: var(--tx-3); margin-bottom: 20px;
}
.nbtn:hover { border-color: var(--primary); color: var(--primary); }

/* 우측 패널 */
.o-panel {
  width: 220px; flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: var(--card);
  display: flex; flex-direction: column;
}
.panel-top {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}
.panel-rows {
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 12px;
  font-size: 12px; flex: 1; overflow-y: auto;
}
.panel-row { display: flex; align-items: flex-start; gap: 8px; }
.panel-row i { font-size: 13px; color: var(--tx-3); margin-top: 2px; flex-shrink: 0; }
.panel-actions { padding: 0 14px 16px; display: flex; flex-direction: column; gap: 6px; }
.pa-btn {
  padding: 8px; font-size: 12px; cursor: pointer;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  background: none; color: var(--tx-1);
  width: 100%; text-align: center; text-decoration: none;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.pa-btn:hover { background: var(--bg); }
.pa-btn.primary {
  background: var(--primary); border-color: var(--primary); color: #fff;
}
.pa-btn.primary:hover { opacity: .88; }
</style>
{% endblock %}

{% block content %}
<div id="og-wrap">
  <div class="o-left">
    <div class="o-bc" id="bc">
      <i class="fas fa-sitemap" style="margin-right:4px;"></i>
    </div>
    <div class="o-canvas" id="cv"></div>
  </div>
  <div class="o-panel" id="panel">
    <div style="flex:1; display:flex; align-items:center; justify-content:center;
                color:var(--tx-3); font-size:12px; padding:20px; text-align:center; line-height:1.8;">
      카드를 클릭하면<br>상세 정보가 표시됩니다<br>
      <span style="font-size:11px; opacity:.6">팀원 있는 카드 더블클릭<br>→ 그 사람 기준으로 이동</span>
    </div>
  </div>
</div>

<script>
const D = {{ employees_json | safe }};
const ME = {{ me }};
const COLS = ['#378ADD','#1D9E75','#D85A30','#7F77DD','#D4537E','#BA7517','#0891b2','#639922','#888780'];
let foc = ME, sel = ME, clickTimer = null;

function col(id) { return COLS[id % COLS.length]; }
function ini(n) { return n ? n[0] : '?'; }

function mkCard(p) {
  const isF = p.id === foc, isS = p.id === sel, isMe = p.id === ME;
  const hasReps = p.reps && p.reps.length > 0;
  return `<div class="pc${isF ? ' p-foc' : isS ? ' p-sel' : ''}" data-id="${p.id}"
    onclick="handleClick(event,${p.id})"
    ondblclick="handleDbl(event,${p.id})"
    title="${p.name} — 클릭:상세보기 / 더블클릭:이 사람 기준 이동">
    ${isMe ? '<div class="p-me">나</div>' : ''}
    <div class="p-av" style="background:${col(p.id)}">${ini(p.name)}</div>
    <div class="p-nm">${p.name}</div>
    <div class="p-tl">${p.title || '—'}</div>
    ${hasReps ? `<div class="p-ct"><i class="fas fa-users" style="font-size:9px"></i>${p.reps.length}명</div>` : ''}
    ${hasReps ? '<div class="pc-tip">더블클릭 → 이동</div>' : ''}
  </div>`;
}

function handleClick(e, id) {
  e.stopPropagation();
  if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; return; }
  clickTimer = setTimeout(() => { clickTimer = null; doSel(id); }, 220);
}

function handleDbl(e, id) {
  e.stopPropagation();
  if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
  nav(id);
}

function render() {
  const f = D[foc];
  if (!f) return;
  const mgr = f.mid ? D[f.mid] : null;
  const mgrMgr = mgr && mgr.mid ? D[mgr.mid] : null;
  const peers = mgr ? mgr.reps.map(r => D[r]).filter(Boolean) : [f];
  const reps = (f.reps || []).map(r => D[r]).filter(Boolean);
  const mgrPeers = mgrMgr ? mgrMgr.reps.map(r => D[r]).filter(Boolean) : (mgr ? [mgr] : []);

  // 브레드크럼 (순환참조 방어)
  let bc = [], cur = f, visited = new Set();
  while (cur && !visited.has(cur.id)) {
    visited.add(cur.id);
    bc.unshift(cur);
    cur = cur.mid ? D[cur.mid] : null;
  }
  document.getElementById('bc').innerHTML =
    '<i class="fas fa-sitemap" style="margin-right:6px; opacity:.5"></i>' +
    bc.map((p, i) =>
      `<span onclick="nav(${p.id})" style="${i === bc.length-1 ? 'color:var(--tx-1);font-weight:700;' : ''}">${p.name}</span>` +
      (i < bc.length-1 ? '<i class="fas fa-chevron-right" style="font-size:9px; opacity:.4; margin:0 2px;"></i>' : '')
    ).join('');

  let h = '';
  if (mgr) {
    h += `<button class="nbtn" onclick="nav(${mgr.id})">
      <i class="fas fa-chevron-up"></i>
      ${mgrMgr ? mgrMgr.name + ' 팀으로' : '상위 조직'}
    </button>`;
  }
  if (mgr && mgrPeers.length) {
    h += `<div class="o-lbl">${mgrMgr ? mgrMgr.name + ' 팀' : '최상위 조직'}</div>`;
    h += `<div class="o-row" style="opacity:.55; margin-bottom:4px">${mgrPeers.map(p => mkCard(p)).join('')}</div>`;
    h += '<div class="o-conn"></div>';
  }
  if (mgr) h += `<div class="o-lbl">${mgr.name} 팀 (${peers.length}명)</div>`;
  h += `<div class="o-row">${peers.map(p => mkCard(p)).join('')}</div>`;
  if (reps.length) {
    h += '<div class="o-conn"></div>';
    h += `<div class="o-lbl">${f.name}의 직속 팀원 (${reps.length}명)</div>`;
    h += `<div class="o-row">${reps.map(p => mkCard(p)).join('')}</div>`;
  }
  document.getElementById('cv').innerHTML = h;
  renderPanel();
}

function renderPanel() {
  const p = D[sel];
  if (!p) return;
  const mgr = p.mid ? D[p.mid] : null;
  const c = col(p.id);
  const isMe = p.id === ME;
  const isAdmin = {{ 'true' if session.user_role in ['admin','manager'] else 'false' }};

  document.getElementById('panel').innerHTML = `
    <div class="panel-top">
      <div style="width:52px;height:52px;border-radius:50%;background:${c};margin:0 auto 10px;
                  display:flex;align-items:center;justify-content:center;
                  font-size:20px;font-weight:700;color:var(--surface);">${ini(p.name)}</div>
      <div style="font-size:14px;font-weight:700;color:var(--tx-1);">
        ${p.name}${isMe ? ' <span style="font-size:10px;background:var(--info-bg);color:var(--primary);padding:1px 7px;border-radius:20px;">나</span>' : ''}
      </div>
      <div style="font-size:12px;color:var(--tx-3);margin-top:3px">${p.title || '—'}</div>
    </div>
    <div class="panel-rows">
      ${pr('fa-building','부서', p.dept)}
      ${pr('fa-envelope','이메일', p.email || '—')}
      ${pr('fa-phone','연락처', p.phone || '—')}
      ${pr('fa-calendar','입사일', p.hire || '—')}
      ${mgr ? pr('fa-user','매니저', mgr.name) : ''}
      ${pr('fa-users','직속 팀원', (p.reps ? p.reps.length : 0) + '명')}
    </div>
    <div class="panel-actions">
      ${foc !== p.id ? `<button class="pa-btn" onclick="nav(${p.id})"><i class="fas fa-sitemap"></i> 이 사람 기준 조직도</button>` : ''}
      ${isAdmin ? `<a class="pa-btn primary" href="/employees/${p.id}"><i class="fas fa-user-circle"></i> 직원 프로필 보기</a>` : ''}
    </div>
  `;
}

function pr(icon, lbl, val) {
  return `<div class="panel-row">
    <i class="fas ${icon}"></i>
    <div>
      <div style="color:var(--tx-3);font-size:11px">${lbl}</div>
      <div style="color:var(--tx-1);font-weight:600;font-size:12px">${val}</div>
    </div>
  </div>`;
}

function doSel(id) {
  sel = id;
  document.querySelectorAll('.pc').forEach(c => {
    const cid = +c.dataset.id;
    c.className = 'pc' + (cid === foc ? ' p-foc' : cid === sel ? ' p-sel' : '');
  });
  renderPanel();
}

function nav(id) { foc = id; sel = id; render(); }

render();
</script>
{% endblock %}
