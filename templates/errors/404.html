{% extends 'base.html' %}
{% block title %}Page Not Found{% endblock %}
{% block page_title %}Error{% endblock %}
{% block content %}
<div style="text-align:center; padding:80px 20px;">
  <div style="font-size:64px; color:var(--border); margin-bottom:16px;">🔍</div>
  <h2 style="font-size:22px; font-weight:800; margin-bottom:8px;">Page Not Found</h2>
  <p style="color:var(--tx-3); margin-bottom:24px;">The page you're looking for doesn't exist.</p>
  <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
    <i class="fas fa-home"></i> Back to Dashboard
  </a>
</div>
{% endblock %}
