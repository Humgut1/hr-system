name: Auto Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: info
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # README.md에서 해당 버전 섹션 추출 (날짜 suffix 허용: v0.18.0 — 2026-04-20)
          VERSION_SECTION=$(awk "/^### ${TAG}/{found=1} found && /^---$/{if(found>1)exit; found++} found{print}" README.md | head -n -1)
          if [ -z "$VERSION_SECTION" ]; then
            VERSION_SECTION="릴리즈 노트: https://github.com/${{ github.repository }}/blob/main/README.md#changelog"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$VERSION_SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: ${{ steps.info.outputs.tag }}
          body: ${{ steps.info.outputs.notes }}
          draft: false
          prerelease: false
