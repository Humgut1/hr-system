name: Auto Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            RANGE=""
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          fi

          # ── 제목 (태그명 + 커밋 제목) ──────────────────────────────
          COMMIT_TITLE=$(git log -1 --pretty=format:"%s" ${CURRENT_TAG})

          # ── 커밋 본문 전체 수집 ─────────────────────────────────────
          if [ -n "$RANGE" ]; then
            COMMIT_BODIES=$(git log --pretty=format:"%b" "$RANGE")
          else
            COMMIT_BODIES=$(git log --pretty=format:"%b" -20)
          fi

          # ── 파일 변경 분류 (추가/수정/삭제) ────────────────────────
          if [ -n "$RANGE" ]; then
            FILE_STATUS=$(git diff --name-status "$PREV_TAG" "$CURRENT_TAG" 2>/dev/null)
          else
            FILE_STATUS=$(git diff --name-status HEAD~1 HEAD 2>/dev/null)
          fi

          ADDED_FILES=$(echo "$FILE_STATUS"   | grep "^A" | awk '{print $2}' | sed 's/^/  - `/' | sed 's/$/`/')
          MODIFIED_FILES=$(echo "$FILE_STATUS" | grep "^M" | awk '{print $2}' | sed 's/^/  - `/' | sed 's/$/`/')
          DELETED_FILES=$(echo "$FILE_STATUS"  | grep "^D" | awk '{print $2}' | sed 's/^/  - `/' | sed 's/$/`/')

          # ── 커밋 본문에서 기능 항목 추출 ────────────────────────────
          # "추가", "신규", "new", "add" 키워드 → 새 기능
          NEW_FEATURES=$(echo "$COMMIT_BODIES" | grep -i -E "^[-*].*(\+|추가|신규|새|new feature|add\b)" | sed 's/^[*-] */  - /')
          # 커밋 본문 - 항목 중 새 기능 이외 → 개선
          IMPROVEMENTS=$(echo "$COMMIT_BODIES" | grep -i -E "^[-*].*(개선|리뉴얼|전면|강화|고도화|refactor|improve|update|enhance)" | sed 's/^[*-] */  - /')
          # "제거", "삭제", "remove", "delete" 키워드 → 제거
          REMOVED=$(echo "$COMMIT_BODIES" | grep -i -E "^[-*].*(제거|삭제|remove|delete|drop)" | sed 's/^[*-] */  - /')
          # "수정", "버그", "fix", "bug" 키워드 → 버그 수정
          FIXES=$(echo "$COMMIT_BODIES" | grep -i -E "^[-*].*(수정|버그|fix|bug|patch|hotfix)" | sed 's/^[*-] */  - /')

          # 키워드 분류가 없으면 본문 전체 항목을 개선으로 fallback
          ALL_ITEMS=$(echo "$COMMIT_BODIES" | grep -E "^[-*] " | sed 's/^[*-] */  - /')
          if [ -z "$NEW_FEATURES" ] && [ -z "$IMPROVEMENTS" ] && [ -z "$FIXES" ] && [ -z "$REMOVED" ]; then
            IMPROVEMENTS="$ALL_ITEMS"
          fi

          # ── 변경 통계 ───────────────────────────────────────────────
          if [ -n "$RANGE" ]; then
            STAT=$(git diff --shortstat "$PREV_TAG" "$CURRENT_TAG" 2>/dev/null)
          else
            STAT=$(git diff --shortstat HEAD~1 HEAD 2>/dev/null)
          fi

          # ── 본문 조립 ───────────────────────────────────────────────
          BODY=""
          BODY="${BODY}## ${COMMIT_TITLE}"$'\n\n'

          if [ -n "$NEW_FEATURES" ]; then
            BODY="${BODY}### ✨ 새 기능"$'\n'"${NEW_FEATURES}"$'\n\n'
          fi
          if [ -n "$IMPROVEMENTS" ]; then
            BODY="${BODY}### 🔧 개선 / 변경"$'\n'"${IMPROVEMENTS}"$'\n\n'
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}### 🐛 버그 수정"$'\n'"${FIXES}"$'\n\n'
          fi
          if [ -n "$REMOVED" ]; then
            BODY="${BODY}### 🗑️ 제거된 기능"$'\n'"${REMOVED}"$'\n\n'
          fi

          BODY="${BODY}---"$'\n\n'
          BODY="${BODY}### 📂 변경된 파일"$'\n\n'

          if [ -n "$ADDED_FILES" ]; then
            BODY="${BODY}**새로 추가된 파일**"$'\n'"${ADDED_FILES}"$'\n\n'
          fi
          if [ -n "$MODIFIED_FILES" ]; then
            BODY="${BODY}**수정된 파일**"$'\n'"${MODIFIED_FILES}"$'\n\n'
          fi
          if [ -n "$DELETED_FILES" ]; then
            BODY="${BODY}**삭제된 파일**"$'\n'"${DELETED_FILES}"$'\n\n'
          fi

          if [ -n "$STAT" ]; then
            BODY="${BODY}📊 \`${STAT}\`"$'\n\n'
          fi

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
            BODY="${BODY}---"$'\n\n'
            BODY="${BODY}**Full changelog:** [\`${PREV_TAG}...${CURRENT_TAG}\`](../../compare/${PREV_TAG}...${CURRENT_TAG})"
          fi

          # GitHub Output 멀티라인 처리
          {
            echo "body<<RELEASE_EOF"
            echo "$BODY"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

          # Release 이름: "v0.48.0 — 성과관리 Big Bang"
          echo "title=${CURRENT_TAG} — ${COMMIT_TITLE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.notes.outputs.title }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
