name: Auto Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: info
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # CHANGELOG.md 또는 README.md에서 해당 버전 섹션 추출
          VERSION_SECTION=$(awk "/^### ${TAG}/,/^### v[0-9]/" README.md | head -n -1)
          if [ -z "$VERSION_SECTION" ]; then
            VERSION_SECTION="릴리즈 노트는 [README Changelog](https://github.com/${{ github.repository }}/blob/main/README.md#changelog)를 참고하세요."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$VERSION_SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: ${{ steps.info.outputs.tag }}
          body: ${{ steps.info.outputs.notes }}
          draft: false
          prerelease: false
